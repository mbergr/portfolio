<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% if page.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  {% seo %}
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f1117;
      --surface:  #1a1d27;
      --border:   #2e3350;
      --accent:   #6c8eff;
      --accent2:  #a78bfa;
      --text:     #e2e8f0;
      --muted:    #8892aa;
      --code-bg:  #161b2e;
      --code-border: #252d4a;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 16px;
      line-height: 1.7;
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ── Nav ── */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(15,17,23,.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .nav-inner {
      max-width: 760px; margin: 0 auto; padding: 0 24px;
      display: flex; align-items: center; justify-content: space-between;
      height: 56px;
    }
    .nav-logo { font-weight: 700; font-size: 15px; color: var(--text); }
    .nav-logo:hover { text-decoration: none; color: var(--accent); }
    .nav-links { display: flex; gap: 24px; list-style: none; }
    .nav-links a { color: var(--muted); font-size: 14px; font-weight: 500; transition: color .2s; }
    .nav-links a:hover { color: var(--text); text-decoration: none; }
    .nav-links a.active { color: var(--accent); }

    /* ── Main content ── */
    main {
      max-width: 760px; margin: 0 auto;
      padding: 56px 24px 96px;
    }

    /* ── Footer ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 28px 24px; text-align: center;
      color: var(--muted); font-size: 13px;
    }
    footer a { color: var(--muted); }
    footer a:hover { color: var(--text); }

    /* ── Syntax highlighting (Rouge) ── */
    .highlight {
      background: var(--code-bg);
      border: 1px solid var(--code-border);
      border-radius: 8px;
      padding: 20px;
      overflow-x: auto;
      margin: 24px 0;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 13.5px;
      line-height: 1.6;
    }
    .highlight pre { background: transparent; padding: 0; margin: 0; }
    code.highlighter-rouge {
      background: var(--code-bg);
      border: 1px solid var(--code-border);
      border-radius: 4px;
      padding: 2px 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: #c9d1e0;
    }

    /* Rouge dark token colors */
    .highlight .c,  .highlight .c1, .highlight .cm { color: #5c6a8a; font-style: italic; }
    .highlight .k,  .highlight .kd, .highlight .kn,
    .highlight .kp, .highlight .kr, .highlight .kt { color: #a78bfa; font-weight: 500; }
    .highlight .s,  .highlight .s1, .highlight .s2,
    .highlight .sb, .highlight .sc, .highlight .sd,
    .highlight .sh, .highlight .si, .highlight .sx { color: #7dd3a8; }
    .highlight .n,  .highlight .na, .highlight .nb,
    .highlight .nc, .highlight .nd, .highlight .ni,
    .highlight .nn, .highlight .no { color: #e2e8f0; }
    .highlight .nf, .highlight .fm { color: #6c8eff; }
    .highlight .m,  .highlight .mi, .highlight .mf,
    .highlight .mh, .highlight .mo { color: #f9a870; }
    .highlight .o,  .highlight .ow { color: #a78bfa; }
    .highlight .p               { color: #8892aa; }
    .highlight .nt              { color: #6c8eff; }
    .highlight .nv, .highlight .vi { color: #f9a870; }
    .highlight .err             { color: #ff6b6b; }
  </style>
</head>
<body>

  <nav>
    <div class="nav-inner">
      <a class="nav-logo" href="{{ site.baseurl }}/">MB</a>
      <ul class="nav-links">
        <li><a href="{{ site.baseurl }}/">Home</a></li>
        <li><a href="{{ site.baseurl }}/blog/" {% if page.url contains '/blog' %}class="active"{% endif %}>Blog</a></li>
      </ul>
    </div>
  </nav>

  <main>
    {{ content }}
  </main>

  <footer>
    <div>Mathias Berg · <a href="https://github.com/mbergr">github.com/mbergr</a></div>
  </footer>

</body>
</html>
