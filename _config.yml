# ─── Site ───────────────────────────────────────────────────────────────────
title: "Mathias Berg"
description: >
  Data Analyst transitioning to Analytics Engineering.
  Writing about dbt, DuckDB, SQL, Python, and data engineering.
url: "https://mbergr.github.io"
baseurl: "/portfolio"

# ─── Build ──────────────────────────────────────────────────────────────────
# No remote_theme / theme: Jekyll serves index.html as-is (no front matter).
# Layouts in _layouts/ are only applied to pages that declare layout: in ---
markdown: kramdown
highlighter: rouge

kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: false

# ─── Permalinks ─────────────────────────────────────────────────────────────
permalink: /blog/:year/:month/:title/

# ─── Plugins (all whitelisted by github-pages gem) ──────────────────────────
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

# ─── Exclude from build ─────────────────────────────────────────────────────
exclude:
  - BLOG_README.md
  - "*.sh"
